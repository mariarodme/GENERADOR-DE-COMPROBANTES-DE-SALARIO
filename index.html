<html lang="es">
<head>

<title>Comprobantes de Pago - Monte Carlo / Jaco Beach</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f0ebe3;min-height:100vh;color:#1a1a1a}
.top-bar{background:#2c1810;padding:0 28px;display:flex;align-items:center;gap:0;border-bottom:3px solid #c8a06a}
.top-bar .logo-area{padding:12px 20px 12px 0;border-right:1px solid rgba(255,255,255,0.1);margin-right:16px}
.top-bar .logo-area img{max-height:42px;object-fit:contain}
.tab-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;padding:18px 20px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;letter-spacing:0.5px;transition:all .2s}
.tab-btn.active{color:#c8a06a;border-bottom-color:#c8a06a}
.tab-btn:hover{color:#fff}
.sub-tabs{background:#3d2008;padding:0 28px;display:flex;gap:0}
.sub-tab-btn{background:none;border:none;color:rgba(255,255,255,0.55);font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.sub-tab-btn.active{color:#e8c87a;border-bottom-color:#e8c87a}
.main{max-width:1100px;margin:0 auto;padding:24px 28px}
.panel{background:#fff;border-radius:8px;padding:28px;box-shadow:0 2px 12px rgba(44,24,16,0.08)}
.panel h2{font-size:14px;font-weight:700;color:#2c1810;margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid #f0ebe3;padding-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
input,select{width:100%;padding:10px 14px;border:1.5px solid #e0d4c4;border-radius:6px;font-family:'Poppins',sans-serif;font-size:13px;color:#1a1a1a;background:#fff;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#c8a06a}
input[type=number]{-moz-appearance:textfield}
.btn{border:none;padding:12px 24px;border-radius:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#2c1810;color:#fff}
.btn-gold{background:#c8a06a;color:#2c1810}
.btn-brown{background:#5c3d1e;color:#fff}
.btn-sm{padding:8px 14px;font-size:11px}
.btn-danger{background:#8b2020;color:#fff}
.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.preview-card{background:#fff;border-radius:8px;padding:22px;box-shadow:0 2px 12px rgba(44,24,16,0.08);border-top:4px solid #c8a06a}
.preview-card h3{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.preview-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f0eb;font-size:12px}
.preview-row:last-child{border:none}
.preview-row span:first-child{color:#666}
.preview-row span:last-child{font-weight:700;color:#2c1810}
.preview-neto{margin-top:14px;background:#2c1810;border-radius:6px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.preview-neto .label{color:#c8a06a;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.preview-neto .amount{color:#fff;font-size:20px;font-weight:800}
.hist-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.hist-toolbar select{width:auto;min-width:260px}
.hist-card{background:#fff;border-radius:8px;padding:18px 22px;box-shadow:0 2px 8px rgba(44,24,16,0.07);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.hist-card .hc-info h4{font-size:13px;font-weight:700;color:#1a1a1a}
.hist-card .hc-info p{font-size:11px;color:#999;margin-top:3px}
.hist-card .hc-neto{font-size:16px;font-weight:800;color:#2c1810;white-space:nowrap}
.hist-card .hc-btns{display:flex;gap:8px}
.msg{margin-top:12px;font-size:12px;font-weight:600;padding:8px 14px;border-radius:6px;display:inline-block}
.msg.ok{background:#e8f5e9;color:#2e7d32}
.msg.err{background:#fdecea;color:#8b2020}
.empty{text-align:center;padding:40px;color:#bbb;font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
@media(max-width:800px){.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}

</style>
</head>

<div class="main">
  <div id="panel-form">
    <div class="two-col">
      <div class="panel">
        <h2 id="form-title">Nuevo Comprobante</h2>
        <div class="form-grid">
          <div class="full">
            <label>Quincena</label>
            <select id="f-quincena"></select>

            </select>
          </div>
          <div>

              <option>Seguridad</option>
              <option>Asistente Administrativa</option>
            </select>
          </div>

      </div>

          <option value="">Todas las quincenas</option>
        </select>
        <button class="btn btn-brown btn-sm" onclick="handleGuardarTodos()">Guardar todos como PDF</button>
        <button class="btn btn-gold btn-sm" onclick="handleExcel()">Exportar Excel</button>
      </div>
      <div id="hist-list"></div>
    </div>
  </div>

<script>

const LOGO_SRC = document.querySelector('.logo-area img').src;

// Storage using localStorage
const STORE = {
  set(key,val){ try{localStorage.setItem('mc:'+key,val);return true;}catch(e){return false;} },
  get(key){ try{return localStorage.getItem('mc:'+key);}catch(e){return null;} },
  del(key){ try{localStorage.removeItem('mc:'+key);}catch(e){} },
  keys(prefix){ const r=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('mc:'+prefix))r.push(k.slice(3));}return r; }
};

const fmt = n => '\u20a1'+Number(n||0).toLocaleString('es-CR',{minimumFractionDigits:2,maximumFractionDigits:2});
const noZero = v => (parseFloat(v)||0)===0?'\u2014':fmt(v);

const MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SETIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const QUINCENAS = [];
const now = new Date();
for(let i=0;i<24;i++){
  const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), mn=MONTHS[d.getMonth()];
  QUINCENAS.push({value:y+'-'+m+'-II', label:'II SEGUNDA QUINCENA '+mn+' '+y});
  QUINCENAS.push({value:y+'-'+m+'-I',  label:'I PRIMERA QUINCENA '+mn+' '+y});
}

const EMPLEADOS_JACO = [
  {nombre:'KAREN ENRIQUEZ CRUZ'},{nombre:'MARIA BEATRIZ RODRIGUEZ'},
  {nombre:'PAULA URBINA'},{nombre:'ALVARO SALAS PICADO'},
  {nombre:'MARIA MERCEDES TORREZ GONZALEZ'},{nombre:'ELSA GUDIEL'},{nombre:'GRISELDA ROBLES'}
];
const EMPLEADOS_MONTECARLO = [
  {nombre:'HAROLD VALVERDE'},{nombre:'ARLIS MEJIAS RAMIREZ'},
  {nombre:'NELSON RAMON ICABALZETA'},{nombre:'MARTIN DE LOS SANTOS'},
  {nombre:'MARLON GRANADOS'},{nombre:'MARIO A MEJIA ULATE'},{nombre:'CRISTIAN CHAVARRIA'}
];

const SLIP_TYPES = {
  jaco_oficina:{
    id:'jaco_oficina',label:'Jaco Beach Oficina',prefix:'jaco',
    fields:[
      {key:'salarioMensual',label:'Salario Bruto Mensual (\u20a1)',def:0},
      {key:'rentas',label:'Comisiones de Rentas (\u20a1)',def:0},
      {key:'toursTransfers',label:'Comisiones Tours y Transfer (\u20a1)',def:0},
      {key:'diasDoblesPagados',label:'Dias Dobles Pagados (\u20a1)',def:0},
      {key:'rebajoImpuestos',label:'Rebajo por Impuestos (\u20a1)',def:0}
    ],
    calc(f){
      const bm=f.salarioMensual||0,bq=bm/2;
      const com=(f.rentas||0)+(f.toursTransfers||0);
      const mfc=bq+com,dd=f.diasDoblesPagados||0,tcd=mfc+dd;
      const cs=tcd*0.1083,imp=f.rebajoImpuestos||0;
      return {bm,bq,com,mfc,dd,tcd,cs,imp,neto:tcd-cs-imp};
    }
  },
  jaco_otros:{
    id:'jaco_otros',label:'Jaco Beach Otros Puestos',prefix:'jaco',
    fields:[
      {key:'salarioMensual',label:'Salario Bruto Mensual (\u20a1)',def:0},
      {key:'diasLaborados',label:'Dias Laborados',def:15},
      {key:'diasPendientes',label:'Dias Pendientes (\u20a1)',def:0},
      {key:'diasDoblesPagados',label:'Dias Dobles Pagados (\u20a1)',def:0}
    ],
    calc(f){
      const bm=f.salarioMensual||0,bq=bm/2;
      const dd=f.diasDoblesPagados||0,dp=f.diasPendientes||0;
      const mf=bq+dd+dp,cs=mf*0.1083;
      return {bm,bq,dd,dp,mf,cs,neto:mf-cs};
    }
  },
  montecarlo:{
    id:'montecarlo',label:'Monte Carlo',prefix:'montecarlo',
    fields:[
      {key:'salarioMensual',label:'Salario Bruto Mensual (\u20a1)',def:0},
      {key:'horasExtra',label:'Horas Extra (\u20a1)',def:0},
      {key:'diasDoblesTrabajados',label:'Dias Dobles Trabajados (\u20a1)',def:0},
      {key:'diasLibrePendiente',label:'Dias Libre Pendiente (\u20a1)',def:0}
    ],
    calc(f){
      const bm=f.salarioMensual||0,bq=bm/2;
      const he=f.horasExtra||0,dd=f.diasDoblesTrabajados||0,dl=f.diasLibrePendiente||0;
      const mfe=bq+he+dd+dl,cs=mfe*0.1083;
      return {bm,bq,he,dd,dl,mfe,cs,neto:mfe-cs};
    }
  }
};

let company='jaco', slipType='jaco_oficina', subTab='form';
let formVals={};

(function initSelects(){
  const qs=document.getElementById('f-quincena');
  QUINCENAS.forEach(q=>{const o=document.createElement('option');o.value=q.value;o.textContent=q.label;qs.appendChild(o);});
  const hf=document.getElementById('hist-filter');
  QUINCENAS.forEach(q=>{const o=document.createElement('option');o.value=q.value;o.textContent=q.label;hf.appendChild(o);});
})();

function switchCompany(c){
  company=c;
  document.getElementById('tab-jaco').classList.toggle('active',c==='jaco');
  document.getElementById('tab-montecarlo').classList.toggle('active',c==='montecarlo');
  document.getElementById('sub-tabs-jaco').style.display=c==='jaco'?'flex':'none';
  document.getElementById('sub-tabs-montecarlo').style.display=c==='montecarlo'?'flex':'none';
  slipType=c==='montecarlo'?'montecarlo':'jaco_oficina';
  formVals={};
  renderForm();
  if(subTab==='hist') renderHist();
}

function switchSlipType(st){
  slipType=st;
  ['jaco_oficina','jaco_otros'].forEach(id=>{
    const el=document.getElementById('stab-'+id);
    if(el) el.classList.toggle('active',id===st);
  });
  formVals={};
  renderForm();
}

function switchSubTab(t){
  subTab=t;
  document.getElementById('panel-form').style.display=t==='form'?'block':'none';
  document.getElementById('panel-hist').style.display=t==='hist'?'block':'none';
  const prefix=company==='jaco'?'jaco':'montecarlo';
  ['subtab-form-jaco','subtab-hist-jaco','subtab-form-montecarlo','subtab-hist-montecarlo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.remove('active');
  });

function renderForm(){
  const st=SLIP_TYPES[slipType];
  document.getElementById('form-title').textContent='Nuevo Comprobante - '+st.label;
  const emps=company==='montecarlo'?EMPLEADOS_MONTECARLO:EMPLEADOS_JACO;
  const sel=document.getElementById('f-nombre');
  sel.innerHTML='<option value="">-- Seleccione --</option>';
  emps.forEach(e=>{const o=document.createElement('option');o.value=e.nombre;o.textContent=e.nombre;sel.appendChild(o);});
  const df=document.getElementById('dynamic-fields');
  df.innerHTML='';
  st.fields.forEach(f=>{
    const div=document.createElement('div');
    const val=formVals[f.key]!==undefined?formVals[f.key]:(f.def||0);
    div.innerHTML='<label>'+f.label+'</label><input type="number" id="df-'+f.key+'" value="'+val+'" min="0"/>';
    div.querySelector('input').addEventListener('input',function(){
      formVals[f.key]=parseFloat(this.value)||0;updatePreview();
    });
    div.querySelector('input').addEventListener('focus',function(){
      if(this.value==='0')this.value='';
    });
    div.querySelector('input').addEventListener('blur',function(){
      if(this.value==='')this.value='0';
    });
    df.appendChild(div);
  });
  updatePreview();
}

function updatePreview(){
  const st=SLIP_TYPES[slipType];
  const f=getFormData();
  const c=st.calc(f);
  let html='';
  const row=(l,v)=>'<div class="preview-row"><span>'+l+'</span><span>'+v+'</span></div>';
  if(slipType==='jaco_oficina'){
    html+=row('Salario Quincenal',fmt(c.bq));
    html+=row('Comisiones',noZero(c.com));
    html+=row('Dias Dobles',noZero(c.dd));
    html+=row('Subtotal',fmt(c.tcd));
    html+=row('Cargas Sociales','- '+fmt(c.cs));
    html+=row('Impuesto Renta','- '+fmt(c.imp));
  } else if(slipType==='jaco_otros'){
    html+=row('Salario Quincenal',fmt(c.bq));
    html+=row('Dias Dobles',noZero(c.dd));
    html+=row('Dias Pendientes',noZero(c.dp));
    html+=row('Subtotal',fmt(c.mf));
    html+=row('Cargas Sociales','- '+fmt(c.cs));
  } else {
    html+=row('Salario Quincenal',fmt(c.bq));
    html+=row('Horas Extra',noZero(c.he));
    html+=row('Dias Dobles',noZero(c.dd));
    html+=row('Dias Libre',noZero(c.dl));
    html+=row('Subtotal',fmt(c.mfe));
    html+=row('Cargas Sociales','- '+fmt(c.cs));
  }
  document.getElementById('preview-rows').innerHTML=html;
  document.getElementById('preview-neto').textContent=fmt(c.neto);
}

function getFormData(){
  const st=SLIP_TYPES[slipType];
  const f={};
  st.fields.forEach(fi=>{
    const el=document.getElementById('df-'+fi.key);
    f[fi.key]=el?parseFloat(el.value)||0:(fi.def||0);
  });
  f.nombre=document.getElementById('f-nombre').value;
  f.puesto=document.getElementById('f-puesto').value;
  f.quincena=document.getElementById('f-quincena').value;
  f.fechaPago=document.getElementById('f-fechaPago').value;
  f.slipType=slipType;
  return f;
}

}

function openSlipWindow(html){
  const b=new Blob([html],{type:'text/html;charset=utf-8'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.target='_blank';a.rel='noopener';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(u);},5000);
}
function downloadHTML(html,filename){
  const b=new Blob([html],{type:'text/html;charset=utf-8'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(u);},3000);
}

function handleImprimir(){ openSlipWindow(buildSlipHTML(getFormData())); }
function handleDescargar(){
  const f=getFormData();
  const name=(f.nombre||'empleado').replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');
  downloadHTML(buildSlipHTML(f),'Comprobante_'+name+'_'+f.quincena+'.html');
}

function handleGuardar(){
  const f=getFormData();
  if(!f.nombre){showMsg('form-msg','Seleccione un empleado','err');return;}
  const key=SLIP_TYPES[slipType].prefix+'_'+slipType+':'+f.quincena+':'+(f.nombre).replace(/\s+/g,'_');
  const rec=Object.assign({},f,{savedAt:new Date().toISOString()});
  const ok=STORE.set(key,JSON.stringify(rec));
  showMsg('form-msg',ok?'Guardado correctamente':'Error al guardar',ok?'ok':'err');
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.innerHTML='<span class="msg '+type+'">'+text+'</span>';
  setTimeout(function(){el.innerHTML='';},3500);
}

function getHistRecords(){
  const st=SLIP_TYPES[slipType];
  const prefix=st.prefix+'_'+slipType+':';
  const keys=STORE.keys(prefix);
  const recs=[];
  keys.forEach(function(k){
    try{const v=STORE.get(k);if(v)recs.push(JSON.parse(v));}catch(e){}
  });
  return recs.sort(function(a,b){return b.quincena.localeCompare(a.quincena);});
}

function renderHist(){
  const filter=document.getElementById('hist-filter').value;
  let recs=getHistRecords();
  if(filter) recs=recs.filter(function(r){return r.quincena===filter;});
  const list=document.getElementById('hist-list');
  if(recs.length===0){list.innerHTML='<div class="empty">No hay comprobantes guardados.</div>';list._recs=[];return;}
  list._recs=recs;
  list.innerHTML=recs.map(function(r,i){
    const st=SLIP_TYPES[r.slipType||slipType];
    const q=QUINCENAS.find(function(q){return q.value===r.quincena;});
    const qLabel=q?q.label:r.quincena;
    const c=st.calc(r);
    return '<div class="hist-card"><div class="hc-info"><h4>'+(r.nombre||'--')+'</h4><p>'+qLabel+' &middot; '+(r.puesto||'')+'</p></div><div class="hc-neto">'+fmt(c.neto)+'</div><div class="hc-btns"><button class="btn btn-primary btn-sm" onclick="histPrint('+i+')">&#128438;</button><button class="btn btn-brown btn-sm" onclick="histDownload('+i+')">&#128190;</button><button class="btn btn-danger btn-sm" onclick="histDelete('+i+')">&#10005;</button></div></div>';
  }).join('');
}

function histPrint(i){openSlipWindow(buildSlipHTML(document.getElementById('hist-list')._recs[i]));}
function histDownload(i){
  const r=document.getElementById('hist-list')._recs[i];
  const name=(r.nombre||'empleado').replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');
  downloadHTML(buildSlipHTML(r),'Comprobante_'+name+'_'+r.quincena+'.html');
}
function histDelete(i){
  const r=document.getElementById('hist-list')._recs[i];
  const st=SLIP_TYPES[r.slipType||slipType];
  const key=st.prefix+'_'+(r.slipType||slipType)+':'+r.quincena+':'+(r.nombre).replace(/\s+/g,'_');
  STORE.del(key);
  renderHist();
}

function handleGuardarTodos(){
  const filter=document.getElementById('hist-filter').value;
  let recs=getHistRecords();
  if(filter) recs=recs.filter(function(r){return r.quincena===filter;});
  if(recs.length===0)return;
  const q=filter?QUINCENAS.find(function(q){return q.value===filter;}):null;
  const qLabel=q?q.label:'Todos';
  const st=SLIP_TYPES[slipType];
  const css=buildSlipCSS().replace(/@media print[^}]*\{[^}]*\}/,'')+'@page{size:letter;margin:12mm 14mm}.sw{page-break-after:always;display:flex;justify-content:center;padding:20px 16px}.sw:last-child{page-break-after:avoid}@media print{.sw{padding:0}body{background:#fff}}';
  const bodies=recs.map(function(r){return '<div class="sw">'+buildSlipBody(r)+'</div>';}).join('');
  const combined='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Planilla '+qLabel+'</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/><style>'+css+'</style></head><body>'+bodies+'<script>window.onload=function(){window.print();}<\/script></body></html>';
  downloadHTML(combined,'Planilla_'+st.label.replace(/\s+/g,'_')+'_'+(filter||'completa')+'.html');
}

function handleExcel(){
  const filter=document.getElementById('hist-filter').value;
  let recs=getHistRecords();
  if(filter) recs=recs.filter(function(r){return r.quincena===filter;});
  if(recs.length===0)return;
  const st=SLIP_TYPES[slipType];
  const q=filter?QUINCENAS.find(function(q){return q.value===filter;}):null;
  const qLabel=q?q.label:'Todos los registros';
  const wb=XLSX.utils.book_new();
  let headers,rows;
  if(slipType==='jaco_oficina'){
    headers=['Nombre','Puesto','Sal. Mensual','Sal. Quincenal','Com. Rentas','Com. Tours','Dias Dobles','Total c/Dobles','Cargas (10.83%)','Imp. Renta','Salario Neto'];
    rows=recs.map(function(r){const c=st.calc(r);return[r.nombre||'',r.puesto||'',c.bm,c.bq,r.rentas||0,r.toursTransfers||0,c.dd,c.tcd,c.cs,c.imp,c.neto];});
  } else if(slipType==='jaco_otros'){
    headers=['Nombre','Puesto','Sal. Mensual','Sal. Quincenal','Dias Laborados','Dias Pendientes','Dias Dobles','Monto Final','Cargas (10.83%)','Salario Neto'];
    rows=recs.map(function(r){const c=st.calc(r);return[r.nombre||'',r.puesto||'',c.bm,c.bq,r.diasLaborados||15,c.dp,c.dd,c.mf,c.cs,c.neto];});
  } else {
    headers=['Nombre','Puesto','Sal. Mensual','Sal. Quincenal','Horas Extra','Dias Dobles','Dias Libre','Monto Final','Cargas (10.83%)','Salario Neto'];
    rows=recs.map(function(r){const c=st.calc(r);return[r.nombre||'',r.puesto||'',c.bm,c.bq,c.he,c.dd,c.dl,c.mfe,c.cs,c.neto];});
  }
  const aoa=[[st.label+' - '+qLabel],[],headers].concat(rows);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  XLSX.utils.book_append_sheet(wb,ws,qLabel.substring(0,31));
  XLSX.writeFile(wb,'Planilla_'+st.label.replace(/\s+/g,'_')+'_'+(filter||'completa')+'.xlsx');
}

renderForm();
